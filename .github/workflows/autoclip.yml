name: 🤖 AI Clipper Bot - Serverless 24/7 Automation

on:
  schedule:
    # Runs automatically every 8 hours (3 times a day: 00:00, 08:00, 16:00 UTC)
    - cron: '0 */8 * * *'
  workflow_dispatch: # Allows manual 1-click trigger from GitHub Web / Mobile App

permissions:
  contents: write

jobs:
  run-clipper:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install FFmpeg System Dependency
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: 📚 Install Python Dependencies & Playwright
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          sudo playwright install-deps chromium

      - name: 🔑 Configure Environment (.env)
        env:
          GROQ_KEY_1: ${{ secrets.GROQ_KEY_1 }}
          GROQ_KEY_2: ${{ secrets.GROQ_KEY_2 }}
          GROQ_KEY_3: ${{ secrets.GROQ_KEY_3 }}
          GROQ_KEY_4: ${{ secrets.GROQ_KEY_4 }}
          GROQ_KEY_5: ${{ secrets.GROQ_KEY_5 }}
          GROQ_KEY_6: ${{ secrets.GROQ_KEY_6 }}
          GROQ_KEY_7: ${{ secrets.GROQ_KEY_7 }}
          GROQ_KEY_8: ${{ secrets.GROQ_KEY_8 }}
          GROQ_KEY_9: ${{ secrets.GROQ_KEY_9 }}
          GROQ_KEY_10: ${{ secrets.GROQ_KEY_10 }}
          SOURCE_FEED_URL: ${{ secrets.SOURCE_FEED_URL }}
        run: |
          cat <<EOF > .env
          GROQ_KEY_1=${GROQ_KEY_1}
          GROQ_KEY_2=${GROQ_KEY_2}
          GROQ_KEY_3=${GROQ_KEY_3}
          GROQ_KEY_4=${GROQ_KEY_4}
          GROQ_KEY_5=${GROQ_KEY_5}
          GROQ_KEY_6=${GROQ_KEY_6}
          GROQ_KEY_7=${GROQ_KEY_7}
          GROQ_KEY_8=${GROQ_KEY_8}
          GROQ_KEY_9=${GROQ_KEY_9}
          GROQ_KEY_10=${GROQ_KEY_10}
          SOURCE_FEED_URL=${SOURCE_FEED_URL:-https://www.youtube.com/@HubermanLab/videos}
          RAMPUP_MODE=true
          EOF

      - name: 🚀 Execute AI Clipper Engine (Single Run)
        env:
          SINGLE_RUN: "true"
        run: |
          python main.py

      - name: 💾 Save Database State (Deduplication Sync)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bot_state.db || true
          git commit -m "chore: sync bot_state.db deduplication state [skip ci]" || true
          git push || true
